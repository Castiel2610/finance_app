name: finance_app
description: Controle Financeiro - Projeto Mobile Nativo
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State Management - Riverpod
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.4

  # Database Local - SQLite
  sqflite: ^2.3.2
  path_provider: ^2.1.3
  path: ^1.9.0

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1

  # HTTP & Network
  http: ^1.2.2
  connectivity_plus: ^6.0.3

  # UI & Animations
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.1
  crypto: ^3.0.3
  uuid: ^4.4.2
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true

